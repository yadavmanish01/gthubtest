<!DOCTYPE html>
<html lang="en">
<head>

    <title>EduChanger</title>
    <style>

            background: #f4f7fb;

            margin: 0;
        }

        .container {

            margin-top: 20px;

    <div class="container">
        <h1>🚀 Website Deployed Successfully!</h1>
